name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: atlas-gardener-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out atlas-gardener
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - name: Check out authoritative contracts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-infra
          path: .contracts/atlas-infra

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0, Node 24
        with:
          python-version: "3.12"

      - name: Compile
        run: python -m compileall -q src tests

      - name: Test
        env:
          ATLAS_GARDENER_CONTRACTS: ${{ github.workspace }}/.contracts/atlas-infra/contracts/v1
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Doctor
        run: >-
          PYTHONPATH=src python -m atlas_gardener doctor
          --contracts-root .contracts/atlas-infra/contracts/v1

      - name: Check whitespace
        run: git diff --check
