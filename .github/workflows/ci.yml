name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: atlas-gardener-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out atlas-gardener
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check out authoritative contracts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: AtlasReaper311/atlas-infra
          path: .contracts/atlas-infra

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Compile
        run: python -m compileall -q src tests

      - name: Test
        env:
          ATLAS_GARDENER_CONTRACTS: ${{ github.workspace }}/.contracts/atlas-infra/contracts/v1
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Doctor
        run: >-
          PYTHONPATH=src python -m atlas_gardener doctor
          --contracts-root .contracts/atlas-infra/contracts/v1

      - name: Check whitespace
        run: git diff --check
