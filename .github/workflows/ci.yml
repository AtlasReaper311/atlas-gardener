name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: atlas-gardener-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AUTHORITY_SHA: 70f8e3867e92e28305fde22b41705a6eb46bd9f1
      ATLAS_GARDENER_CONTRACTS: ${{ github.workspace }}/.contracts/atlas-infra/contracts/v1
      ATLAS_GARDENER_TEST_INFRA_ROOT: ${{ github.workspace }}/.contracts/atlas-infra
    steps:
      - name: Check out atlas-gardener
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - name: Check out reviewed automation authority
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-infra
          ref: 70f8e3867e92e28305fde22b41705a6eb46bd9f1
          path: .contracts/atlas-infra
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0, Node 24
        with:
          python-version: "3.12"

      - name: Verify immutable authority
        run: |
          set -euo pipefail
          test "$(git -C "$ATLAS_GARDENER_TEST_INFRA_ROOT" rev-parse HEAD)" = "$AUTHORITY_SHA"
          python3 "$ATLAS_GARDENER_TEST_INFRA_ROOT/scripts/validate_gardener_automation.py" --quiet

      - name: Compile
        run: python -m compileall -q src tests scripts

      - name: Run repository-isolated tests
        run: |
          set -euo pipefail
          : > /tmp/atlas-gardener-repository-tests.log
          for path in tests/test_*.py
          do
            module="$(basename "$path" .py)"
            case "$module" in
              test_automation|test_automerge_gate|test_controller)
                continue
                ;;
            esac
            if ! PYTHONPATH=src:tests python -m unittest "$module" -v >> /tmp/atlas-gardener-repository-tests.log 2>&1
            then
              cat /tmp/atlas-gardener-repository-tests.log
              exit 1
            fi
          done

      - name: Test automation policy and bundle logic
        env:
          ATLAS_GARDENER_INFRA_ROOT: ${{ env.ATLAS_GARDENER_TEST_INFRA_ROOT }}
        run: PYTHONPATH=src:tests python -m unittest test_automation -v

      - name: Gate accepts exact low-risk success
        id: gate_success
        continue-on-error: true
        env:
          ATLAS_GARDENER_INFRA_ROOT: ${{ env.ATLAS_GARDENER_TEST_INFRA_ROOT }}
        run: PYTHONPATH=src:tests python -m unittest test_automerge_gate.AutomergeGateTests.test_successful_low_risk_ci_is_eligible -v

      - name: Gate refuses missing checks
        id: gate_missing_checks
        continue-on-error: true
        env:
          ATLAS_GARDENER_INFRA_ROOT: ${{ env.ATLAS_GARDENER_TEST_INFRA_ROOT }}
        run: PYTHONPATH=src:tests python -m unittest test_automerge_gate.AutomergeGateTests.test_missing_checks_never_count_as_success -v

      - name: Gate refuses failed CI
        id: gate_failed_ci
        continue-on-error: true
        env:
          ATLAS_GARDENER_INFRA_ROOT: ${{ env.ATLAS_GARDENER_TEST_INFRA_ROOT }}
        run: PYTHONPATH=src:tests python -m unittest test_automerge_gate.AutomergeGateTests.test_failed_ci_prevents_merge -v

      - name: Gate refuses changed commits
        id: gate_changed_commit
        continue-on-error: true
        env:
          ATLAS_GARDENER_INFRA_ROOT: ${{ env.ATLAS_GARDENER_TEST_INFRA_ROOT }}
        run: PYTHONPATH=src:tests python -m unittest test_automerge_gate.AutomergeGateTests.test_changed_head_and_extra_commit_fail_closed -v

      - name: Gate refuses protected paths
        id: gate_paths
        continue-on-error: true
        env:
          ATLAS_GARDENER_INFRA_ROOT: ${{ env.ATLAS_GARDENER_TEST_INFRA_ROOT }}
        run: PYTHONPATH=src:tests python -m unittest test_automerge_gate.AutomergeGateTests.test_workflow_source_and_lockfile_paths_fail_closed -v

      - name: Gate refuses deletions and unexpected lines
        id: gate_patch
        continue-on-error: true
        env:
          ATLAS_GARDENER_INFRA_ROOT: ${{ env.ATLAS_GARDENER_TEST_INFRA_ROOT }}
        run: PYTHONPATH=src:tests python -m unittest test_automerge_gate.AutomergeGateTests.test_deletion_and_unapproved_line_fail_closed -v

      - name: Gate refuses expired or changed policy
        id: gate_expiry
        continue-on-error: true
        env:
          ATLAS_GARDENER_INFRA_ROOT: ${{ env.ATLAS_GARDENER_TEST_INFRA_ROOT }}
        run: PYTHONPATH=src:tests python -m unittest test_automerge_gate.AutomergeGateTests.test_expired_and_changed_policy_fail_closed -v

      - name: Preserve auto-merge gate result
        if: always()
        env:
          GATE_SUCCESS: ${{ steps.gate_success.outcome }}
          GATE_MISSING_CHECKS: ${{ steps.gate_missing_checks.outcome }}
          GATE_FAILED_CI: ${{ steps.gate_failed_ci.outcome }}
          GATE_CHANGED_COMMIT: ${{ steps.gate_changed_commit.outcome }}
          GATE_PATHS: ${{ steps.gate_paths.outcome }}
          GATE_PATCH: ${{ steps.gate_patch.outcome }}
          GATE_EXPIRY: ${{ steps.gate_expiry.outcome }}
        run: |
          set -euo pipefail
          for outcome in \
            "$GATE_SUCCESS" \
            "$GATE_MISSING_CHECKS" \
            "$GATE_FAILED_CI" \
            "$GATE_CHANGED_COMMIT" \
            "$GATE_PATHS" \
            "$GATE_PATCH" \
            "$GATE_EXPIRY"
          do
            test "$outcome" = "success"
          done

      - name: Test automatic controller modes
        env:
          ATLAS_GARDENER_INFRA_ROOT: ${{ env.ATLAS_GARDENER_TEST_INFRA_ROOT }}
        run: PYTHONPATH=src:tests python -m unittest test_controller -v

      - name: Doctor
        run: >-
          PYTHONPATH=src python -m atlas_gardener doctor
          --contracts-root .contracts/atlas-infra/contracts/v1

      - name: Validate shell files
        run: |
          set -euo pipefail
          find scripts -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Check whitespace
        run: git diff --check
