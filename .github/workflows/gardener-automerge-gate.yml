name: Reusable Gardener auto-merge gate

on:
  workflow_call:
    inputs:
      enabled:
        description: "Target repository opt-in"
        required: false
        default: false
        type: boolean
      expected_app_login:
        description: "Exact Atlas Gardener GitHub App bot login"
        required: true
        type: string
      required_checks_json:
        description: "JSON array of required target CI check names"
        required: true
        type: string
      authority_ref:
        description: "Immutable merged atlas-infra authority commit"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: gardener-automerge-${{ github.repository }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  validate-and-enable:
    name: Validate Gardener automatic merge
    if: >-
      inputs.enabled &&
      github.event_name == 'pull_request' &&
      github.event.pull_request != null
    permissions:
      contents: write
      pull-requests: write
      checks: read
      statuses: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out immutable Gardener gate implementation
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          path: .atlas-gardener
          persist-credentials: false

      - name: Check out immutable Atlas Infra authority
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: AtlasReaper311/atlas-infra
          ref: ${{ inputs.authority_ref }}
          path: .atlas-infra
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0, Node 24
        with:
          python-version: "3.12"

      - name: Validate immutable gate inputs
        env:
          AUTHORITY_REF: ${{ inputs.authority_ref }}
          REQUIRED_CHECKS_JSON: ${{ inputs.required_checks_json }}
        run: |
          set -euo pipefail
          test "$(git -C .atlas-infra rev-parse HEAD)" = "$AUTHORITY_REF"
          python3 - <<'PY'
          import json
          import os

          checks = json.loads(os.environ["REQUIRED_CHECKS_JSON"])
          if not isinstance(checks, list) or not checks:
              raise SystemExit("required_checks_json must contain at least one check name")
          if checks != sorted(set(checks)):
              raise SystemExit("required_checks_json must be sorted and unique")
          if any(not isinstance(value, str) or not value for value in checks):
              raise SystemExit("required_checks_json must contain non-empty strings")
          PY
          python3 .atlas-infra/scripts/validate_gardener_automation.py --quiet
          python3 -m py_compile \
            .atlas-gardener/scripts/build_gardener_file_evidence.py \
            .atlas-gardener/scripts/gardener_automerge_gate.py \
            .atlas-gardener/scripts/gardener_gate_marker.py

      - name: Wait for exact required checks
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REQUIRED_CHECKS_JSON: ${{ inputs.required_checks_json }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60)
          do
            gh pr view "$PR_URL" \
              --json number,state,isDraft,body,author,headRefName,headRefOid,baseRefName,baseRefOid,commits,statusCheckRollup \
              > /tmp/gardener-pr.json

            CHECK_STATE=$(python3 - <<'PY'
          import json
          import os

          document = json.load(open("/tmp/gardener-pr.json", encoding="utf-8"))
          required = json.loads(os.environ["REQUIRED_CHECKS_JSON"])
          states = {}
          for item in document.get("statusCheckRollup") or []:
              if not isinstance(item, dict):
                  continue
              name = item.get("name") or item.get("context")
              state = item.get("conclusion") or item.get("state") or item.get("status")
              if isinstance(name, str) and isinstance(state, str):
                  states[name] = state.upper()

          missing = [name for name in required if name not in states]
          failed_values = {
              "ACTION_REQUIRED", "CANCELLED", "ERROR", "FAILURE",
              "SKIPPED", "STALE", "TIMED_OUT",
          }
          success_values = {"SUCCESS", "NEUTRAL"}
          failed = [name for name in required if states.get(name) in failed_values]
          pending = [
              name
              for name in required
              if name in states and states[name] not in success_values | failed_values
          ]
          if failed:
              print("failed")
          elif missing or pending:
              print("pending")
          else:
              print("success")
          PY
          )

            case "$CHECK_STATE" in
              success)
                break
                ;;
              failed)
                printf '%s\n' '{"eligible":false,"reason":"required target CI failed","state":"refused"}' \
                  > /tmp/gardener-gate-result.json
                exit 1
                ;;
              pending)
                if [ "$attempt" -eq 60 ]; then
                  printf '%s\n' '{"eligible":false,"reason":"required target CI did not complete within the bounded wait","state":"refused"}' \
                    > /tmp/gardener-gate-result.json
                  exit 1
                fi
                sleep 15
                ;;
              *)
                printf '%s\n' '{"eligible":false,"reason":"required target CI returned an unknown state","state":"refused"}' \
                  > /tmp/gardener-gate-result.json
                exit 1
                ;;
            esac
          done

      - name: Check out exact target base evidence
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.base.sha }}
          path: .gardener-target-base
          sparse-checkout: .gitignore
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Check out exact target head evidence
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: .gardener-target-head
          sparse-checkout: .gitignore
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Capture exact changed files and file bytes
        id: files
        run: |
          set -euo pipefail
          python3 .atlas-gardener/scripts/build_gardener_file_evidence.py \
            --pr /tmp/gardener-pr.json \
            --base-root .gardener-target-base \
            --head-root .gardener-target-head \
            --files-output /tmp/gardener-files.json \
            --base-output /tmp/gardener-base-gitignore \
            --head-output /tmp/gardener-head-gitignore \
            --gate-result-output /tmp/gardener-gate-result.json

      - name: Revalidate the automatic approval
        id: gate
        env:
          BASE_FILE: ${{ steps.files.outputs.base_file }}
          EXPECTED_APP_LOGIN: ${{ inputs.expected_app_login }}
          REQUIRED_CHECKS_JSON: ${{ inputs.required_checks_json }}
        run: |
          set -euo pipefail
          ARGS=(
            --pr /tmp/gardener-pr.json
            --files /tmp/gardener-files.json
            --head-file /tmp/gardener-head-gitignore
            --policy .atlas-infra/policy/gardener-automation.json
            --coverage .atlas-infra/policy/gardener-github-app-coverage.json
            --expected-app-login "$EXPECTED_APP_LOGIN"
            --required-checks "$REQUIRED_CHECKS_JSON"
            --output /tmp/gardener-gate-result.json
          )
          if [ -n "$BASE_FILE" ]; then
            ARGS+=(--base-file "$BASE_FILE")
          fi
          PYTHONPATH=.atlas-gardener/src \
            python3 .atlas-gardener/scripts/gardener_automerge_gate.py "${ARGS[@]}"

      - name: Record machine-readable target gate outcome
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REQUIRED_CHECKS_JSON: ${{ inputs.required_checks_json }}
        run: |
          set -euo pipefail
          if [ ! -s /tmp/gardener-pr.json ]; then
            gh pr view "$PR_URL" \
              --json number,state,isDraft,body,author,headRefName,headRefOid,baseRefName,baseRefOid,commits,statusCheckRollup \
              > /tmp/gardener-pr.json
          fi
          if [ ! -s /tmp/gardener-gate-result.json ]; then
            printf '%s\n' '{"eligible":false,"reason":"target gate failed before detailed validation","state":"refused"}' \
              > /tmp/gardener-gate-result.json
          fi
          PYTHONPATH=.atlas-gardener/src \
            python3 .atlas-gardener/scripts/gardener_gate_marker.py \
              --pr /tmp/gardener-pr.json \
              --gate-result /tmp/gardener-gate-result.json \
              --required-checks "$REQUIRED_CHECKS_JSON" \
              --output /tmp/gardener-pr-body.md
          gh pr edit "$PR_URL" --body-file /tmp/gardener-pr-body.md

      - name: Enable native squash auto-merge
        if: steps.gate.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          gh pr view "$PR_URL" \
            --json id,state,headRefOid,autoMergeRequest \
            > /tmp/gardener-automerge-before.json

          python3 - <<'PY'
          import json
          import os

          document = json.load(
              open("/tmp/gardener-automerge-before.json", encoding="utf-8")
          )
          if document.get("state") != "OPEN":
              raise SystemExit("pull request is no longer open")
          if document.get("headRefOid") != os.environ["EXPECTED_HEAD_SHA"]:
              raise SystemExit("pull request head changed before auto-merge enablement")
          PY

          CURRENT=$(python3 - <<'PY'
          import json

          document = json.load(
              open("/tmp/gardener-automerge-before.json", encoding="utf-8")
          )
          print("set" if document.get("autoMergeRequest") is not None else "null")
          PY
          )
          if [ "$CURRENT" = "set" ]; then
            echo "Native auto-merge is already enabled."
            exit 0
          fi

          PR_ID=$(python3 - <<'PY'
          import json

          document = json.load(
              open("/tmp/gardener-automerge-before.json", encoding="utf-8")
          )
          print(document["id"])
          PY
          )

          gh api graphql \
            -f query='
              mutation EnableGardenerAutoMerge($pullRequestId: ID!) {
                enablePullRequestAutoMerge(
                  input: {
                    pullRequestId: $pullRequestId
                    mergeMethod: SQUASH
                  }
                ) {
                  pullRequest {
                    state
                    headRefOid
                    autoMergeRequest {
                      enabledAt
                      enabledBy {
                        login
                      }
                      mergeMethod
                    }
                  }
                }
              }
            ' \
            -F pullRequestId="$PR_ID" \
            > /tmp/gardener-automerge-mutation.json

          python3 - <<'PY'
          import json
          import os

          document = json.load(
              open("/tmp/gardener-automerge-mutation.json", encoding="utf-8")
          )
          pull_request = document["data"]["enablePullRequestAutoMerge"]["pullRequest"]
          if pull_request.get("state") != "OPEN":
              raise SystemExit("pull request closed during auto-merge enablement")
          if pull_request.get("headRefOid") != os.environ["EXPECTED_HEAD_SHA"]:
              raise SystemExit("pull request head changed during auto-merge enablement")
          request = pull_request.get("autoMergeRequest")
          if not isinstance(request, dict):
              raise SystemExit("GitHub did not create an autoMergeRequest")
          if request.get("mergeMethod") != "SQUASH":
              raise SystemExit("GitHub created auto-merge with an unexpected merge method")
          enabled_by = (request.get("enabledBy") or {}).get("login")
          if not enabled_by:
              raise SystemExit("autoMergeRequest does not identify its enabling actor")
          print(f"Native auto-merge armed by {enabled_by}.")
          PY

          for attempt in $(seq 1 10)
          do
            gh pr view "$PR_URL" \
              --json state,headRefOid,autoMergeRequest \
              > /tmp/gardener-automerge-after.json

            RESULT=$(python3 - <<'PY'
          import json
          import os

          document = json.load(
              open("/tmp/gardener-automerge-after.json", encoding="utf-8")
          )
          if document.get("state") != "OPEN":
              print("closed")
          elif document.get("headRefOid") != os.environ["EXPECTED_HEAD_SHA"]:
              print("moved")
          elif document.get("autoMergeRequest") is not None:
              print("armed")
          else:
              print("pending")
          PY
          )

            case "$RESULT" in
              armed)
                echo "Verified native autoMergeRequest postcondition."
                exit 0
                ;;
              closed)
                echo "Pull request closed before the auto-merge postcondition was verified." >&2
                exit 1
                ;;
              moved)
                echo "Pull request head changed before the auto-merge postcondition was verified." >&2
                exit 1
                ;;
              pending)
                if [ "$attempt" -eq 10 ]; then
                  echo "GitHub did not retain the native autoMergeRequest." >&2
                  exit 1
                fi
                sleep 2
                ;;
              *)
                echo "Unexpected auto-merge verification state: $RESULT" >&2
                exit 1
                ;;
            esac
          done

      - name: Revoke workflow-owned auto-merge after refusal
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          ACTOR=$(gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest.enabledBy.login // ""')
          if [ "$ACTOR" = "github-actions[bot]" ]; then
            gh pr merge "$PR_URL" --disable-auto
          fi
